services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: class-pet-house
    restart: unless-stopped
    env_file:
      - ./deploy/.env.backend
    environment:
      LOG_LEVEL: info
      LOG_IP_DEBUG: "0"
    ports:
      - "80:3000"
    volumes:
      - ./data:/data
